# macOS example

[mcp_servers.esp32_gpio]
command = "/Users/USER/esp32-mcp-io-extender/host/.venv/bin/python"
args = ["/Users/USER/esp32-mcp-io-extender/host/mcp_gpio_server.py"]
cwd = "/Users/USER/esp32-mcp-io-extender/host"

[mcp_servers.esp32_gpio.env]
ESP_GPIO_PORT = "/dev/tty.usbmodemXXXX"
ESP_GPIO_BAUD = "115200"
ESP_GPIO_TIMEOUT = "2.0"
ESP_GPIO_BOOT_WAIT = "0.8"
ESP_GPIO_RETRIES = "2"
ESP_GPIO_AUTO_PORT = "1"
