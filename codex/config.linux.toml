# Linux example

[mcp_servers.esp32_gpio]
command = "/home/USER/esp32_gpio_codex/host/.venv/bin/python"
args = ["/home/USER/esp32_gpio_codex/host/mcp_gpio_server.py"]
cwd = "/home/USER/esp32_gpio_codex/host"

[mcp_servers.esp32_gpio.env]
ESP_GPIO_PORT = "/dev/ttyACM0"
ESP_GPIO_BAUD = "115200"
ESP_GPIO_TIMEOUT = "2.0"
ESP_GPIO_BOOT_WAIT = "0.8"
ESP_GPIO_RETRIES = "2"
ESP_GPIO_AUTO_PORT = "1"
