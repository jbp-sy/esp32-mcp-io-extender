# Generic Codex MCP config template.
# Replace ABSOLUTE paths and set ESP_GPIO_PORT if auto-detection is not reliable.

[mcp_servers.esp32_gpio]
command = "/ABSOLUTE/PATH/TO/esp32_gpio_codex/host/.venv/bin/python"
args = ["/ABSOLUTE/PATH/TO/esp32_gpio_codex/host/mcp_gpio_server.py"]
cwd = "/ABSOLUTE/PATH/TO/esp32_gpio_codex/host"

[mcp_servers.esp32_gpio.env]
ESP_GPIO_PORT = ""
ESP_GPIO_BAUD = "115200"
ESP_GPIO_TIMEOUT = "2.0"
ESP_GPIO_BOOT_WAIT = "0.8"
ESP_GPIO_RETRIES = "2"
ESP_GPIO_AUTO_PORT = "1"
